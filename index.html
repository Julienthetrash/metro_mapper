<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <title>Mon Métro Paris</title>
  <meta name="description" content="Suivez les stations de métro parisien que vous avez visitées.">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#003CA6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Métro Paris">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" href="icons/icon-192.png">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="app-header" role="banner">
    <h1 id="view-title">Mon Métro Paris</h1>
    <div class="app-header__actions">
      <button id="header-action" class="icon-btn" type="button" aria-label="Action contextuelle" hidden></button>
    </div>
  </header>

  <main id="app-main" class="app-main" role="main" aria-live="polite">
    <section id="view-map" class="view" data-route="map" hidden></section>
    <section id="view-lines" class="view" data-route="lines" hidden></section>
    <section id="view-stats" class="view" data-route="stats" hidden></section>
  </main>

  <nav class="tab-bar" role="navigation" aria-label="Navigation principale">
    <a href="#map" class="tab" data-route="map">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a7 7 0 0 0-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 0 0-7-7zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z"/></svg>
      <span>Carte</span>
    </a>
    <a href="#lines" class="tab" data-route="lines">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
      <span>Lignes</span>
    </a>
    <a href="#stats" class="tab" data-route="stats">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 20V10h3v10H5zm5 0V4h3v16h-3zm5 0v-7h3v7h-3z"/></svg>
      <span>Stats</span>
    </a>
  </nav>

  <div id="station-detail-root" aria-hidden="true"></div>
  <div id="toast-root" aria-live="polite" aria-atomic="true"></div>

  <script src="https://unpkg.com/dexie@4.0.8/dist/dexie.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
